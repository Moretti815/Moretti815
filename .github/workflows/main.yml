# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  # Schedule updates (each hour)
  schedule: [{cron: "0 * * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  # 基础信息
  metrics-base:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.base.svg
          base: header, metadata
          config_timezone: Asia/Shanghai
  
  # 日历插件
  metrics-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.calendar.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_calendar: yes
          plugin_calendar_limit: 2
  
  # 等距日历插件
  metrics-isocalendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.isocalendar.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
  
  # 关注仓库插件
  metrics-followup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.followup.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_followup: yes
          plugin_followup_archived: yes
          plugin_followup_sections: repositories
  
  # 自我介绍插件
  metrics-introduction:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.introduction.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_introduction: yes
          plugin_introduction_title: yes
  
  # 反应插件
  metrics-reactions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.reactions.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_reactions: yes
          plugin_reactions_display: absolute
          plugin_reactions_limit: 200
          plugin_reactions_limit_discussions: 100
          plugin_reactions_limit_discussions_comments: 100
          plugin_reactions_limit_issues: 100
  
  # 收藏仓库插件
  metrics-stars:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.stars.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_stars: yes
          plugin_stars_limit: 4

  # GitHub Metrics 综合指标
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

  # 拼接所有SVG文件到moretti/svg分支
  merge-svg:
    runs-on: ubuntu-latest
    needs: [metrics-base, metrics-calendar, metrics-isocalendar, metrics-followup, metrics-introduction, metrics-reactions, metrics-stars, github-metrics]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Merge SVG files vertically
        run: |
          # 定义SVG文件顺序
          SVG_FILES=(
            "github-metrics.svg"
            "metrics.isocalendar.svg"
            "metrics.calendar.svg"
            "metrics.reactions.svg"
            "metrics.stars.svg"
            "metrics.introduction.svg"
          )

          # 创建临时目录
          mkdir -p ./merged

          # 使用Python脚本进行更可靠的SVG合并
          python3 << 'PYTHON_SCRIPT'
          import xml.etree.ElementTree as ET
          import os
          import re

          svg_files = [
            "github-metrics.svg",
            "metrics.isocalendar.svg",
            "metrics.calendar.svg",
            "metrics.reactions.svg",
            "metrics.stars.svg",
            "metrics.introduction.svg"
          ]

          # 计算总高度和最大宽度
          total_height = 0
          max_width = 0
          file_info = []

          for filename in svg_files:
            if os.path.exists(filename):
              with open(filename, 'r', encoding='utf-8') as f:
                content = f.read()
              
              # 提取width和height
              width_match = re.search(r'width="(\d+)"', content)
              height_match = re.search(r'height="(\d+)"', content)
              
              if width_match and height_match:
                width = int(width_match.group(1))
                height = int(height_match.group(1))
                total_height += height
                max_width = max(max_width, width)
                file_info.append((filename, width, height, content))

          # 创建根SVG元素
          root = ET.Element('svg')
          root.set('xmlns', 'http://www.w3.org/2000/svg')
          root.set('width', str(max_width))
          root.set('height', str(total_height))

          # 添加defs
          defs = ET.SubElement(root, 'defs')
          style = ET.SubElement(defs, 'style')

          current_y = 0
          for filename, width, height, content in file_info:
            # 创建g元素用于定位
            g = ET.SubElement(root, 'g')
            g.set('transform', f'translate(0, {current_y})')
            
            # 提取SVG内部内容（foreignObject等）
            # 找到foreignObject并添加到g中
            foreign_matches = re.findall(r'(<foreignObject.*?</foreignObject>)', content, re.DOTALL)
            for foreign_xml in foreign_matches:
              try:
                foreign_elem = ET.fromstring(foreign_xml)
                g.append(foreign_elem)
              except:
                pass
            
            # 如果没有foreignObject，尝试提取其他SVG元素
            if not foreign_matches:
              # 提取svg标签内的所有内容
              inner_match = re.search(r'<svg[^>]*>(.*?)</svg>', content, re.DOTALL)
              if inner_match:
                inner_content = inner_match.group(1)
                # 移除defs部分，避免重复
                inner_content = re.sub(r'<defs>.*?</defs>', '', inner_content, flags=re.DOTALL)
                # 创建临时元素来包装内容
                try:
                  wrapper = ET.fromstring(f'<g>{inner_content}</g>')
                  for child in wrapper:
                    g.append(child)
                except:
                  pass
            
            current_y += height

          # 写入文件
          tree = ET.ElementTree(root)
          ET.indent(tree, space='  ')
          tree.write('./merged/metrics.merged.svg', encoding='utf-8', xml_declaration=True)

          print("SVG files merged successfully!")
          PYTHON_SCRIPT

          ls -la ./merged/

      - name: Commit to main branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 移动合并后的文件到根目录
          mv ./merged/metrics.merged.svg ./metrics.merged.svg

          # 添加并提交
          git add metrics.merged.svg
          git commit -m "Merge SVG files vertically [$(date +%Y-%m-%d_%H-%M-%S)]" || echo "No changes to commit"

          # 先拉取远程更改，避免冲突
          git pull origin main --rebase || git pull origin main

          # 推送到main分支
          git push origin main
