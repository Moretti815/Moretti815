# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  # Schedule updates (each hour)
  schedule: [{cron: "0 * * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  # 基础信息
  metrics-base:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.base.svg
          base: header, metadata
          config_timezone: Asia/Shanghai
  
  # 日历插件
  metrics-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.calendar.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_calendar: yes
          plugin_calendar_limit: 2
  
  # 等距日历插件
  metrics-isocalendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.isocalendar.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
  
  # 关注仓库插件
  metrics-followup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.followup.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_followup: yes
          plugin_followup_archived: yes
          plugin_followup_sections: repositories
  
  # 自我介绍插件
  metrics-introduction:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.introduction.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_introduction: yes
          plugin_introduction_title: yes
  
  # 反应插件
  metrics-reactions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.reactions.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_reactions: yes
          plugin_reactions_display: absolute
          plugin_reactions_limit: 200
          plugin_reactions_limit_discussions: 100
          plugin_reactions_limit_discussions_comments: 100
          plugin_reactions_limit_issues: 100
  
  # 收藏仓库插件
  metrics-stars:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics.stars.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_stars: yes
          plugin_stars_limit: 4

  # GitHub Metrics 综合指标
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

  # 拼接所有SVG文件到moretti/svg分支
  merge-svg:
    runs-on: ubuntu-latest
    needs: [metrics-base, metrics-calendar, metrics-isocalendar, metrics-followup, metrics-introduction, metrics-reactions, metrics-stars, github-metrics]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Merge SVG files vertically
        run: |
          # 定义SVG文件顺序
          SVG_FILES=(
            "github-metrics.svg"
            "metrics.isocalendar.svg"
            "metrics.calendar.svg"
            "metrics.reactions.svg"
            "metrics.stars.svg"
            "metrics.introduction.svg"
          )

          # 创建临时目录
          mkdir -p ./merged

          # 计算总高度和最大宽度
          TOTAL_HEIGHT=0
          MAX_WIDTH=0

          for file in "${SVG_FILES[@]}"; do
            if [ -f "$file" ]; then
              HEIGHT=$(grep -oP 'height="\K[0-9]+' "$file" | head -1)
              WIDTH=$(grep -oP 'width="\K[0-9]+' "$file" | head -1)
              TOTAL_HEIGHT=$((TOTAL_HEIGHT + HEIGHT))
              if [ "$WIDTH" -gt "$MAX_WIDTH" ]; then
                MAX_WIDTH=$WIDTH
              fi
            fi
          done

          # 创建合并后的SVG文件头
          cat > ./merged/metrics.merged.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="${MAX_WIDTH}" height="${TOTAL_HEIGHT}">
            <defs>
              <style/>
            </defs>
          EOF

          # 拼接每个SVG文件的内容
          CURRENT_Y=0
          for file in "${SVG_FILES[@]}"; do
            if [ -f "$file" ]; then
              HEIGHT=$(grep -oP 'height="\K[0-9]+' "$file" | head -1)
              WIDTH=$(grep -oP 'width="\K[0-9]+' "$file" | head -1)

              # 提取SVG内容（去掉svg标签）
              echo "  <g transform=\"translate(0, ${CURRENT_Y})\">" >> ./merged/metrics.merged.svg
              sed -n '/<svg/,/<\/svg>/p' "$file" | sed '1d;$d' >> ./merged/metrics.merged.svg
              echo "  </g>" >> ./merged/metrics.merged.svg

              CURRENT_Y=$((CURRENT_Y + HEIGHT))
            fi
          done

          # 关闭SVG标签
          echo "</svg>" >> ./merged/metrics.merged.svg

          echo "SVG files merged successfully!"
          ls -la ./merged/

      - name: Commit to main branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 移动合并后的文件到根目录
          mv ./merged/metrics.merged.svg ./metrics.merged.svg

          # 添加并提交
          git add metrics.merged.svg
          git commit -m "Merge SVG files vertically [$(date +%Y-%m-%d_%H-%M-%S)]" || echo "No changes to commit"

          # 推送到main分支
          git push origin main
